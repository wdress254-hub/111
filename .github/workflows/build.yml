name: Build GhostSpec EXE
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Standalone EXE
        run: dotnet publish spoofer/GhostSpec.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./dist

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostSpec-Windows-EXE
          path: ./dist/*.exe
